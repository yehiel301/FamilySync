  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/family_icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FamilySync</title>

    <!-- פונטים וסמלים (אייקונים) מגוגל לפי העיצוב של Stitch -->
